<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard - Fitness App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FF3B30;
            --bg: #000000;
            --card-bg: #1C1C1E;
            --text: #FFFFFF;
            --text-dim: #8E8E93;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        #pin-screen, #coach-auth-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            text-align: center;
        }

        .pin-dots {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .dot.filled {
            background-color: var(--primary);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 250px;
        }

        .num-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid #333;
            background: #1c1c1e;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .coach-container {
            display: none;
            flex-direction: column;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 { color: var(--text-dim); font-size: 14px; margin: 0; }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

        .data-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-dim); padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; background: #333; }
        .btn-logout { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- PIN SKÆRM -->
    <div id="pin-screen">
        <h1 style="color: var(--primary)">COACH ADGANG</h1>
        <p>Indtast PIN-kode for at fortsætte</p>
        <div class="pin-dots" id="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="numpad" id="numpad"></div>
    </div>

    <!-- LOGIN -->
    <div id="coach-auth-screen" style="display: none;">
        <div style="background: var(--card-bg); padding: 30px; border-radius: 20px; width: 300px;">
            <h2>Coach Login</h2>
            <input type="email" id="coach-email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:none; background:#333; color:white;">
            <input type="password" id="coach-password" placeholder="Adgangskode" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:none; background:#333; color:white;">
            <div id="login-err" style="color:#ff6b6b;font-size:12px;margin-bottom:8px;display:none"></div>
            <button onclick="handleCoachLogin()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">LOG IND</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="app" class="coach-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1>Coach Dashboard</h1>
                <p id="coach-name-display" style="color: var(--text-dim)"></p>
            </div>
            <button class="btn-logout" onclick="handleLogout()">Log ud</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Aktive Klienter</h3><p id="stat-clients">0</p></div>
            <div class="stat-card"><h3>Check-ins</h3><p id="stat-checkins">0</p></div>
            <div class="stat-card"><h3>Opstartsskemaer</h3><p id="stat-intakes">0</p></div>
        </div>

        <section class="data-section">
            <h2>Klient Oversigt</h2>
            <div style="overflow-x: auto;">
                <table id="clients-table">
                    <thead>
                        <tr>
                            <th>Navn</th>
                            <th>E-mail</th>
                            <th>Sidste Check-in</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="clients-list"></tbody>
                </table>
            </div>
        </section>

        <section class="data-section">
            <h2>Seneste Check-ins</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Klient</th><th>Uge</th><th>Vægt</th><th>Indsats</th><th>Dato</th></tr>
                    </thead>
                    <tbody id="ci-list"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const SUPA_URL = 'https://rtcayuwapitueckgprzc.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0Y2F5dXdhcGl0dWVja2dwcnpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NzA2MzAsImV4cCI6MjA5MzA0NjYzMH0.uwMOD1w3uvQFGLCTpB8kkGPxM1z1pRvzF2VEANr3VME';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        const CORRECT_PIN = '2024';
        let pinBuffer = '';
        let coachUser = null;

        function initPinPad() {
            const pad = document.getElementById('numpad');
            for(let i=1; i<=9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.onclick = () => addPin(String(i));
                pad.appendChild(btn);
            }
            const delBtn = document.createElement('button');
            delBtn.className = 'num-btn';
            delBtn.textContent = 'C';
            delBtn.onclick = () => { pinBuffer = ''; updatePinDots(); };
            pad.appendChild(delBtn);

            const zeroBtn = document.createElement('button');
            zeroBtn.className = 'num-btn';
            zeroBtn.textContent = '0';
            zeroBtn.onclick = () => addPin('0');
            pad.appendChild(zeroBtn);
        }

        function addPin(num) {
            if(pinBuffer.length < 4) {
                pinBuffer += num;
                updatePinDots();
                if(pinBuffer.length === 4) {
                    if(pinBuffer === CORRECT_PIN) {
                        document.getElementById('pin-screen').style.display = 'none';
                        document.getElementById('coach-auth-screen').style.display = 'flex';
                    } else {
                        alert('Forkert PIN!');
                        pinBuffer = '';
                        updatePinDots();
                    }
                }
            }
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('filled', i < pinBuffer.length);
            });
        }

        async function handleCoachLogin() {
            const email = document.getElementById('coach-email').value.trim();
            const pass = document.getElementById('coach-password').value;
            const errEl = document.getElementById('login-err');
            errEl.style.display = 'none';
            const { error } = await sb.auth.signInWithPassword({ email, password: pass });
            if(error) {
                errEl.textContent = 'Forkert e-mail eller adgangskode.';
                errEl.style.display = 'block';
            }
        }

        async function handleLogout() {
            await sb.auth.signOut();
            location.reload();
        }

        sb.auth.onAuthStateChange(async (event, session) => {
            if (session?.user) {
                coachUser = session.user;
                document.getElementById('coach-auth-screen').style.display = 'none';
                document.getElementById('pin-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('coach-name-display').textContent = coachUser.email;
                await loadAllData();
            }
        });

        async function loadAllData() {
            try {
                const { data: profiles } = await sb.from('profiles').select('*');
                const { data: checkins } = await sb.from('checkins').select('*').order('created_at', {ascending: false});
                const { data: intakes } = await sb.from('intake_forms').select('*');

                const p = profiles || [];
                const c = checkins || [];
                const inp = intakes || [];

                document.getElementById('stat-clients').textContent = p.length;
                document.getElementById('stat-checkins').textContent = c.length;
                document.getElementById('stat-intakes').textContent = inp.length;

                const clientsList = document.getElementById('clients-list');
                clientsList.innerHTML = p.length ? p.map(profile => {
                    const lastCi = c.find(ci => ci.user_id === profile.id);
                    return `<tr>
                        <td>${profile.full_name || '—'}</td>
                        <td style="color:#8E8E93;font-size:12px">${profile.email || '—'}</td>
                        <td>${lastCi ? new Date(lastCi.created_at).toLocaleDateString('da-DK') : 'Ingen'}</td>
                        <td><span class="badge">${lastCi ? 'Aktiv' : 'Ny'}</span></td>
                    </tr>`;
                }).join('') : '<tr><td colspan="4" style="text-align:center;color:#666;padding:20px">Ingen klienter endnu</td></tr>';

                const ciList = document.getElementById('ci-list');
                ciList.innerHTML = c.slice(0,10).map(ci => {
                    const profile = p.find(pr => pr.id === ci.user_id);
                    return `<tr>
                        <td>${profile?.full_name || '—'}</td>
                        <td><span class="badge">Uge ${ci.week}</span></td>
                        <td>${ci.weight ? ci.weight + ' kg' : '—'}</td>
                        <td>${ci.score ? ci.score + '/10' : '—'}</td>
                        <td style="color:#8E8E93;font-size:12px">${new Date(ci.created_at).toLocaleDateString('da-DK')}</td>
                    </tr>`;
                }).join('') || '<tr><td colspan="5" style="text-align:center;color:#666;padding:20px">Ingen check-ins endnu</td></tr>';

            } catch (err) {
                alert('Fejl ved indlæsning: ' + err.message);
            }
        }

        initPinPad();
    </script>
</body>
</html>
